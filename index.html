<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITTA - Sistem Pemesanan Bahan Ajar Universitas Terbuka</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Navbar -->
        <div class="navbar">
            <h1>📚 SITTA - Pemesanan Bahan Ajar UT</h1>
            <div class="nav-tabs">
                <div 
                    class="nav-tab" 
                    :class="{ active: currentTab === 'stok' }" 
                    @click="currentTab = 'stok'"
                >
                    📦 Stok Bahan Ajar
                </div>
                <div 
                    class="nav-tab" 
                    :class="{ active: currentTab === 'tracking' }" 
                    @click="currentTab = 'tracking'"
                >
                    🚚 Tracking DO
                </div>
            </div>
        </div>

        <!-- Content Container -->
        <div class="container">
            <!-- Tab: Stok Bahan Ajar -->
            <ba-stock-table v-if="currentTab === 'stok'"></ba-stock-table>
            
            <!-- Tab: Tracking Delivery Order -->
            <do-tracking v-if="currentTab === 'tracking'"></do-tracking>
        </div>
    </div>

    <!-- Modal untuk konfirmasi -->
    <app-modal 
        v-if="modalVisible"
        :title="modalTitle"
        :content="modalContent"
        :type="modalType"
        @close="closeModal"
        @confirm="handleModalConfirm"
    ></app-modal>

    <!-- Vue.js -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.js"></script>

    <!-- Services -->
    <script src="js/services/api.js"></script>

    <!-- Components -->
    <script src="js/components/status-badge.js"></script>
    <script src="js/components/app-modal.js"></script>
    <script src="js/components/stock-table.js"></script>
    <script src="js/components/do-tracking.js"></script>
    <script src="js/components/order-form.js"></script>

    <!-- Templates -->
    <script src="js/templates/status-badge.html"></script>
    <script src="js/templates/app-modal.html"></script>
    <script src="js/templates/stock-table.html"></script>
    <script src="js/templates/do-tracking.html"></script>
    <script src="js/templates/order-form.html"></script>

    <!-- Root App -->
    <script src="js/app.js"></script>
</body>
</html>
